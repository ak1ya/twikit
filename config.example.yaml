# デフォルトで使用するアカウント
default_account: main

# アカウント定義（config.yaml は .gitignore 対象なので認証情報を直接記入可）
accounts:
  main:
    email:    main@example.com
    username: main_user
    password: mainpassword
    cookies:  cookies_main.json

  sub:
    email:    sub@example.com
    username: sub_user
    password: subpassword
    cookies:  cookies_sub.json

tweet:
  text: "{{date}} のツイート本文"  # {{date}} {{time}} {{year}} {{month}} {{day}} {{weekday}} が使用可能
  media:
    - ./media1.png

search:
  tweet:
    query: "検索クエリ"
    type: Top        # Top / Latest / Media
  user:
    query: "検索クエリ"

trends:
  category: news    # trending / news / sports / entertainment

log:
  path: tweet.log   # 投稿ログの保存先

schedules:
  - text: "{{date}} {{weekday}}、おはようございます！"
    at: "09:00"
    account: main    # 省略時は default_account を使用

  - text: "{{month}}月{{day}}日 {{time}} のサブ投稿です。"
    at: "09:30"
    account: sub

  - text: "今週（{{date}}）もありがとうございました！"
    every: monday
    at: "10:00"
    account: main
    media:
      - ./weekly_report.png
